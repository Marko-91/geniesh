services:
  ollama:
    image: ollama/ollama:latest
    container_name: geniesh-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          memory: 8G

  geniesh:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: geniesh-worker
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=qwen3-coder
      - OLLAMA_EMBEDDER=nomic-embed-text
    volumes:
      # Mount source code (live reload for development)
      - ..:/workspace/geniesh
      # Persist node_modules from the image build (overrides the mount)
      - geniesh-node_modules:/workspace/geniesh/node_modules
      - geniesh-data:/workspace/data
    stdin_open: true
    tty: true
    working_dir: /workspace/geniesh
    entrypoint: >
      sh -c "
        dos2unix /workspace/geniesh/src/cli.js /workspace/geniesh/packages/kernel/src/*.js 2>/dev/null
        echo 'Pulling models (first time only) …'
        echo '--- qwen3-coder ---'
        curl -s http://ollama:11434/api/pull -d '{\"name\":\"qwen3-coder\"}'
        echo '--- nomic-embed-text ---'
        curl -s http://ollama:11434/api/pull -d '{\"name\":\"nomic-embed-text\"}'
        echo ''
        echo '=== geniesh ready ==='
        exec /bin/bash -l
      "
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

volumes:
  ollama-data:
    driver: local
  geniesh-node_modules:
    driver: local
  geniesh-data:
    driver: local
